<section id="notulen" class="section">
  <div class="card">
    <h2 class="section-title">
      <i class="fa-solid fa-file-signature" style="color: var(--primary); margin-right: 8px;"></i>Notulen Rapat Kelompok
    </h2>
    <p class="section-desc">
      Pencatatan berita acara dan hasil rumusan mufakat sidang kelompok secara real-time ke database cloud.
    </p>
    
    <div id="alertSuccess" class="alert-box alert-success" style="display: none; padding: 12px 16px; border-radius: 12px; font-size: 13.5px; margin-bottom: 16px; background: #e8f8f5; color: #0f766e; border: 1px solid rgba(26,188,156,0.2); align-items: center; gap: 8px;">
      <i class="fa-solid fa-circle-check"></i> <span>Data notulen rapat berhasil disinkronisasikan ke Google Sheets!</span>
    </div>
    <div id="alertError" class="alert-box alert-error" style="display: none; padding: 12px 16px; border-radius: 12px; font-size: 13.5px; margin-bottom: 16px; background: #fdf2f2; color: #9b1c1c; border: 1px solid rgba(224,86,86,0.2); align-items: center; gap: 8px;">
      <i class="fa-solid fa-circle-exclamation"></i> <span>Gagal mengirim data. Silakan periksa koneksi internet Anda.</span>
    </div>

    <form id="notulenRapatForm" class="portal-form">
        
        <div class="form-group">
            <label for="namaKelompok"><i class="fa-solid fa-anchor"></i> Nama Kelompok Usaha Bersama (KUB)</label>
            <select id="namaKelompok" name="namaKelompok" required>
                <option value="">-- Pilih KUB Binaan --</option>
                <option value="KUB Sumber Makmur">KUB Sumber Makmur (Desa Klampis Timur - Budidaya)</option>
                <option value="KUB Angsa Laut">KUB Angsa Laut (SAMKAI - Tangkap Tradisional)</option>
                <option value="KUB Intimung Taka">KUB Intimung Taka (Bulungan - Pengolahan Hasil)</option>
                <option value="KUB Usaha Nelayan">KUB Usaha Nelayan (Desa Watusa - Tangkap Motor)</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="tanggalRapat"><i class="fa-solid fa-calendar-day"></i> Tanggal Rapat</label>
                <input type="date" id="tanggalRapat" name="tanggalRapat" required>
            </div>
            
            <div class="form-group">
                <label for="namaKegiatan"><i class="fa-solid fa-file-lines"></i> Nama Kegiatan / Agenda Rapat</label>
                <input type="text" id="namaKegiatan" name="namaKegiatan" placeholder="Contoh: Mitigasi Hama & Pakan Tambak" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="namaPembicara"><i class="fa-solid fa-circle-user"></i> Nama Pembicara / Pemimpin Sidang</label>
                <input type="text" id="namaPembicara" name="namaPembicara" placeholder="Ketik nama pembicara utama..." required>
            </div>
            
            <div class="form-group">
                <label for="jabatanPembicara"><i class="fa-solid fa-address-card"></i> Jabatan Pembicara</label>
                <select id="jabatanPembicara" name="jabatanPembicara" required>
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Ketua KUB">Ketua KUB</option>
                    <option value="Sekretaris Kelompok">Sekretaris Kelompok</option>
                    <option value="Bendahara Kelompok">Bendahara Kelompok</option>
                    <option value="Penyuluh Lapangan">Penyuluh Lapangan DKP</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="pokokMateri"><i class="fa-solid fa-book-open-reader"></i> Pokok Materi Pembahasan</label>
            <textarea id="pokokMateri" name="pokokMateri" rows="3" placeholder="Uraikan poin utama atau masalah lapangan yang disampaikan oleh pembicara..." required></textarea>
        </div>

        <div class="form-group">
            <label for="kesimpulan"><i class="fa-solid fa-gavel"></i> Kesimpulan / Hasil Keputusan Mufakat</label>
            <textarea id="kesimpulan" name="kesimpulan" rows="3" placeholder="Ketik rumusan solusi atau keputusan hasil kesepakatan akhir rapat..." required></textarea>
        </div>

        <button type="submit" id="btnSubmitNotulen" class="form-btn-submit">
          <i class="fa-solid fa-cloud-arrow-up"></i> <span id="btnText">Kirim & Sinkronisasikan Data Rapat</span>
        </button>
    </form>
  </div>
</section>

<script>
  const notulenForm = document.getElementById('notulenRapatForm');
  const btnSubmit = document.getElementById('btnSubmitNotulen');
  const btnText = document.getElementById('btnText');
  const successAlert = document.getElementById('alertSuccess');
  const errorAlert = document.getElementById('alertError');
  
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3zbOvgM5fvWbSJtZNHLMwy70o1HTlOVHu2NH5C917_FQmgAdiqxIs4kKMqrglTzOy/exec";

  if (notulenForm) {
    notulenForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      btnSubmit.disabled = true;
      btnText.innerText = "Memproses & Sinkronisasi Cloud...";
      successAlert.style.display = 'none';
      errorAlert.style.display = 'none';

      const formData = new FormData(notulenForm);
      
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: formData,
        mode: 'no-cors'
      })
      .then(() => {
        successAlert.style.display = 'flex';
        notulenForm.reset();
      })
      .catch((error) => {
        console.error('Error:', error);
        errorAlert.style.display = 'flex';
      })
      .finally(() => {
        btnSubmit.disabled = false;
        btnText.innerText = "Kirim & Sinkronisasikan Data Rapat";
      });
    });
  }
</script>
